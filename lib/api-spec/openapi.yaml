openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: games
    description: Game management operations
  - name: accounts
    description: Account management operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags:
        - health
      summary: Health check
      description: Returns server health status
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
  /readyz:
    get:
      operationId: readinessCheck
      tags:
        - health
      summary: Readiness check
      description: Returns whether the server can reach its dependencies (e.g. PostgreSQL)
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessStatus'
        '503':
          description: Not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessStatus'
  /games:
    get:
      operationId: listGames
      tags:
        - games
      summary: List all games
      description: Returns all games, including inactive ones, with account counts.
      responses:
        '200':
          description: Games list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameListResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createGame
      tags:
        - games
      summary: Create a game
      description: Creates a new game with a normalized title. Duplicate normalized titles are rejected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGameRequest'
      responses:
        '201':
          description: Game created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Duplicate normalized title
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /games/{id}:
    get:
      operationId: getGame
      tags:
        - games
      summary: Get a single game
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Game found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResponse'
        '400':
          description: Invalid UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      operationId: updateGame
      tags:
        - games
      summary: Update a game
      description: |
        Updates a game's title, cover URL, status, or platform.
        Platform changes are blocked once accounts exist for the game.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGameRequest'
      responses:
        '200':
          description: Game updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResponse'
        '400':
          description: Invalid UUID or request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Duplicate normalized title or platform change blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteGame
      tags:
        - games
      summary: Delete a game
      description: |
        Hard-deletes a game when no account history exists.
        Deletion is blocked when accounts reference the game.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Game deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Invalid UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Game has account history and cannot be deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /games/{gameId}/accounts:
    get:
      operationId: listAccounts
      tags:
        - accounts
      summary: List all accounts for a game
      description: Returns non-secret Account summaries for a single Game.
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Accounts list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountListResponse'
        '400':
          description: Invalid UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
    post:
      operationId: createAccount
      tags:
        - accounts
      summary: Create an account for a game
      description: >-
        Creates a new Account, its Capacity template, and its encrypted Backup Codes. The Game ID is taken from the path
        only. Duplicate values may be accepted by sending the same request again with `confirmed: true`.
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetailResponse'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
        '403':
          description: Account operations disabled in the mounted runtime
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
        '409':
          description: Duplicate warning, inactive game, or identifier conflict
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/DuplicateWarningResponse'
                  - $ref: '#/components/schemas/StandardApiError'
        '500':
          description: Unexpected or encryption configuration failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
  /accounts/{accountId}:
    get:
      operationId: getAccount
      tags:
        - accounts
      summary: Get a single account
      description: Returns safe Account metadata without any Secret.
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Account found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetailResponse'
        '400':
          description: Invalid UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
    patch:
      operationId: updateAccount
      tags:
        - accounts
      summary: Update an account
      description: >-
        Updates editable Account fields. Immutable fields, Backup Codes, and
        Capacities cannot be changed. Duplicate values against other Accounts may
        be accepted by sending `confirmed: true`.
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountRequest'
      responses:
        '200':
          description: Account updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetailResponse'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
        '403':
          description: Account operations disabled in the mounted runtime
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
        '409':
          description: Duplicate warning
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateWarningResponse'
        '500':
          description: Unexpected or encryption configuration failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
  /accounts/{accountId}/capacities:
    get:
      operationId: getAccountCapacities
      tags:
        - accounts
      summary: Get account capacities
      description: Returns Capacity rows and derived Account status information required by the Account workspace.
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Account capacities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountCapacitiesResponse'
        '400':
          description: Invalid UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
  /accounts/{accountId}/status-override:
    patch:
      operationId: setAccountStatusOverride
      tags:
        - accounts
      summary: Set account status override
      description: >-
        Sets, changes, or clears the Account status override. Accepted values are
        SOLD, INACTIVE, or null. The response includes the recalculated canonical
        Account status. Capacities and Customer Assignments are not modified.
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetAccountStatusOverrideRequest'
      responses:
        '200':
          description: Account status override updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetailResponse'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
        '403':
          description: Account operations disabled in the mounted runtime
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardApiError'
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ReadinessStatus:
      type: object
      properties:
        status:
          type: string
        checks:
          type: object
          properties:
            database:
              type: string
          required:
            - database
      required:
        - status
        - checks
    GamePlatform:
      type: string
      enum:
        - PS5_ONLY
        - PS4_AND_PS5
        - PS4_ONLY
    GameStatus:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
    Game:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        titleNormalized:
          type: string
        coverUrl:
          type: string
          nullable: true
        platform:
          $ref: '#/components/schemas/GamePlatform'
        status:
          $ref: '#/components/schemas/GameStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - title
        - titleNormalized
        - platform
        - status
        - createdAt
        - updatedAt
    GameListItem:
      allOf:
        - $ref: '#/components/schemas/Game'
        - type: object
          properties:
            accountCount:
              type: integer
          required:
            - accountCount
    GameListResponse:
      type: object
      properties:
        games:
          type: array
          items:
            $ref: '#/components/schemas/GameListItem'
      required:
        - games
    GameResponse:
      type: object
      properties:
        game:
          $ref: '#/components/schemas/Game'
      required:
        - game
    CreateGameRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120
          pattern: ^(?!\s*$).+$
          description: Game title. Must be 1-120 characters and cannot be whitespace-only.
        coverUrl:
          type: string
          format: uri
        platform:
          $ref: '#/components/schemas/GamePlatform'
        status:
          $ref: '#/components/schemas/GameStatus'
      required:
        - title
        - platform
    UpdateGameRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120
          pattern: ^(?!\s*$).+$
          description: Game title. Must be 1-120 characters and cannot be whitespace-only.
        coverUrl:
          type: string
          format: uri
          nullable: true
        platform:
          $ref: '#/components/schemas/GamePlatform'
        status:
          $ref: '#/components/schemas/GameStatus'
    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        issues:
          type: array
          items:
            type: object
      required:
        - error
    AccountStatus:
      type: string
      enum:
        - AVAILABLE
        - PARTIALLY_SOLD
        - SOLD
        - INACTIVE
    CapacityKind:
      type: string
      enum:
        - Z2_PS5
        - Z2_PS4
        - Z3_SHARED_PS5_PS4
    AccountListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        gameId:
          type: string
          format: uuid
        accountCode:
          type: string
        accountNumberPrefix:
          type: string
        accountNumberSeq:
          type: integer
        displayNumber:
          type: string
        onlineId:
          type: string
          nullable: true
        birthDate:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/AccountStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - gameId
        - accountCode
        - accountNumberPrefix
        - accountNumberSeq
        - displayNumber
        - onlineId
        - birthDate
        - status
        - createdAt
        - updatedAt
    AccountDetail:
      allOf:
        - $ref: '#/components/schemas/AccountListItem'
        - type: object
          properties:
            capacities:
              type: array
              items:
                $ref: '#/components/schemas/AccountCapacity'
          required:
            - capacities
    AccountCapacity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        capacityKind:
          $ref: '#/components/schemas/CapacityKind'
        instanceNo:
          type: integer
        displayLabel:
          type: string
        isFinished:
          type: boolean
        finishedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - accountId
        - capacityKind
        - instanceNo
        - displayLabel
        - isFinished
        - finishedAt
    AccountListResponse:
      type: object
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountListItem'
      required:
        - accounts
    AccountDetailResponse:
      type: object
      properties:
        account:
          $ref: '#/components/schemas/AccountDetail'
      required:
        - account
    AccountCapacitiesResponse:
      type: object
      properties:
        capacities:
          type: array
          items:
            $ref: '#/components/schemas/AccountCapacity'
        status:
          $ref: '#/components/schemas/AccountStatus'
      required:
        - capacities
        - status
    CreateAccountRequest:
      type: object
      properties:
        psnEmail:
          type: string
          format: email
        psnPassword:
          type: string
          minLength: 1
        emailPassword:
          type: string
          minLength: 1
        onlineId:
          type: string
          minLength: 1
        birthDate:
          type: string
          pattern: ^\d{4}-\d{2}-\d{2}$
        familyManagementEmail:
          type: string
          format: email
        backupCodes:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
        confirmed:
          type: boolean
          default: false
      required:
        - psnEmail
        - psnPassword
        - emailPassword
        - onlineId
        - birthDate
        - familyManagementEmail
        - backupCodes
    UpdateAccountRequest:
      type: object
      properties:
        psnEmail:
          type: string
          format: email
        psnPassword:
          type: string
          minLength: 1
        emailPassword:
          type: string
          minLength: 1
        onlineId:
          type: string
          minLength: 1
        birthDate:
          type: string
          pattern: ^\d{4}-\d{2}-\d{2}$
        familyManagementEmail:
          type: string
          format: email
        confirmed:
          type: boolean
          default: false
      additionalProperties: false
    SetAccountStatusOverrideRequest:
      type: object
      properties:
        statusOverride:
          type: string
          nullable: true
          enum:
            - SOLD
            - INACTIVE
      required:
        - statusOverride
      additionalProperties: false
    DuplicateWarningResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
          enum:
            - DUPLICATE_WARNING
        detail:
          type: object
          properties:
            duplicateFields:
              type: array
              items:
                $ref: '#/components/schemas/DuplicateFieldName'
          required:
            - duplicateFields
      required:
        - error
        - code
        - detail
    StandardApiError:
      type: object
      properties:
        error:
          type: string
          description: Persian user-safe message
        code:
          type: string
          description: Machine-readable error code
        issues:
          type: array
          items:
            type: object
      required:
        - error
        - code
    DuplicateFieldName:
      type: string
      enum:
        - psnEmail
        - familyManagementEmail
        - onlineId
